services:
  herd-bot:
    build: .
    ports:
      - "8090:8090"
    environment:
      - PORT=8090
    networks:
      - coolify
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.herd-bot.rule=Host(`herd.89.167.27.180.sslip.io`)"
      - "traefik.http.routers.herd-bot.entryPoints=http"
      - "traefik.http.services.herd-bot.loadbalancer.server.port=8090"

networks:
  coolify:
    external: true
